<div class="contenedorCards" *ngFor="let item of datos">
<mat-card class="cardPrueba"> 
    <mat-card-header>
        <div mat-card-avatar class="imagen">
        </div>
        <mat-card-title>
            {{item.titulo}}
        </mat-card-title>
        <mat-card-subtitle>
            {{item.subtitulo}}
        </mat-card-subtitle>
    </mat-card-header>
     <img mat-card-image [src]="item.imagen" alt="">
    <mat-card-content>
       <p>{{item.descripcion}} </p>
    </mat-card-content>
    <mat-card-actions>
        <button mat-button>Enviar</button>
    </mat-card-actions>
</mat-card>
</div>
